<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunflower Life Cycle Holographic Learning System</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            overflow: hidden;
            background: linear-gradient(180deg, #ccefff 0%, #f7ffe8 75%);
        }

        .cloud {
            position: absolute;
            width: 180px;
            height: 60px;
            background: white;
            border-radius: 50px;
            opacity: 0.85;
            animation: moveClouds linear infinite;
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.6);
        }

        .cloud::before,
        .cloud::after {
            content: "";
            position: absolute;
            background: white;
            border-radius: 50%;
        }

        .cloud::before {
            width: 80px;
            height: 80px;
            top: -35px;
            left: 30px;
        }

        .cloud::after {
            width: 100px;
            height: 100px;
            top: -45px;
            right: 25px;
        }

        .cloud-1 {
            top: 90px;
            left: -220px;
            animation-duration: 38s;
        }

        .cloud-2 {
            top: 190px;
            left: -300px;
            transform: scale(0.75);
            animation-duration: 48s;
            animation-delay: 8s;
        }

        .cloud-3 {
            top: 330px;
            left: -260px;
            transform: scale(0.55);
            animation-duration: 55s;
            animation-delay: 18s;
        }

        @keyframes moveClouds {
            from {
                left: -300px;
            }
            to {
                left: 110%;
            }
        }

        .hero {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
        }

        .content {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(8px);
            padding: 55px 65px;
            border-radius: 35px;
            box-shadow: 0 25px 60px rgba(46, 125, 50, 0.18);
            animation: fadeInUp 1.1s ease forwards;
        }

        .sunflower {
            font-size: 70px;
            margin-bottom: 18px;
            display: inline-block;
            animation: sway 3s ease-in-out infinite;
            transform-origin: bottom center;
        }

        h1 {
            font-size: 56px;
            color: #2e7d32;
            margin-bottom: 10px;
            line-height: 1.1;
        }

        h2 {
            font-size: 26px;
            color: #4f8f3a;
            margin-bottom: 22px;
            font-weight: 600;
        }

        p {
            max-width: 780px;
            font-size: 21px;
            color: #3f3f3f;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .start-btn {
            display: inline-block;
            text-decoration: none;
            background: #f9c74f;
            color: #1f1f1f;
            padding: 18px 42px;
            border-radius: 18px;
            font-size: 20px;
            font-weight: 700;
            box-shadow: 0 12px 25px rgba(249, 199, 79, 0.45);
            transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
        }

        .start-btn:hover {
            transform: translateY(-6px) scale(1.03);
            background: #f4b400;
            box-shadow: 0 18px 35px rgba(249, 199, 79, 0.6);
        }

        .grass {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 115px;
            background: linear-gradient(180deg, #7bc96f, #2e7d32);
            border-radius: 50% 50% 0 0 / 30% 30% 0 0;
            z-index: 1;
        }

        @keyframes sway {
            0%, 100% {
                transform: rotate(-4deg);
            }
            50% {
                transform: rotate(4deg);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(35px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .content {
                padding: 40px 25px;
            }

            h1 {
                font-size: 38px;
            }

            h2 {
                font-size: 21px;
            }

            p {
                font-size: 17px;
            }

            .sunflower {
                font-size: 58px;
            }
        }
    </style>
</head>

<body>
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>

    <main class="hero">
        <section class="content">
            <div class="sunflower">🌻</div>

            <h1>Sunflower Life Cycle</h1>
            <h2>Holographic Learning System</h2>

            <p>
                Explore the five stages of sunflower growth through interactive
                3D models and holographic projection technology.
            </p>

            <a href="#" class="start-btn">Start Exploring</a>
        </section>
    </main>

    <div class="grass"></div>
</body>
</html>
